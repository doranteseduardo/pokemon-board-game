      // =============================================================
      // CAMERA CONTROL
      // =============================================================
      let camDesiredPos = new THREE.Vector3(0, 14, 10);
      let camDesiredTarget = new THREE.Vector3(0, 0, 0);

      function setCameraTarget(tx, ty, tz, cx, cy, cz) {
        camDesiredTarget.set(tx, ty || 0, tz);
        if (cx !== undefined) camDesiredPos.set(cx, cy, cz);
      }

      function setCameraForPlayer(playerIdx) {
        if (!GS) return;
        const p = GS.players[playerIdx];
        if (!p || p.position === 0) {
          // Default overview
          camDesiredTarget.set(0, 0, 0);
          camDesiredPos.set(0, 14, 10);
          return;
        }
        const pos = cell3D(p.position);
        camDesiredTarget.set(pos.x, 0.5, pos.z);
        camDesiredPos.set(pos.x + 4, 8, pos.z + 6);
      }

      function setCameraOverview() {
        camDesiredTarget.set(0, 0, 0);
        camDesiredPos.set(0, 14, 10);
      }

      // Wait until camera reaches near its target (within threshold)
      function waitForCamera(threshold = 0.5) {
        return new Promise((resolve) => {
          function check() {
            const posDist = camera.position.distanceTo(camDesiredPos);
            const tgtDist = camTarget.distanceTo(camDesiredTarget);
            if (posDist < threshold && tgtDist < threshold) {
              resolve();
              return;
            }
            requestAnimationFrame(check);
          }
          requestAnimationFrame(check);
        });
      }

      // =============================================================
      // MAIN ANIMATION LOOP
      // =============================================================
      function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const time = clock.getElapsedTime();

        // Camera smooth follow
        camera.position.lerp(camDesiredPos, camLerpSpeed);
        camTarget.lerp(camDesiredTarget, camLerpSpeed);
        camera.lookAt(camTarget);

        // Dice physics
        if (diceRolling) {
          diceMesh.rotation.x += diceVelX;
          diceMesh.rotation.y += diceVelY;
          diceMesh.rotation.z += diceVelZ;
          diceVelX *= 0.97;
          diceVelY *= 0.97;
          diceVelZ *= 0.97;
          const totalVel =
            Math.abs(diceVelX) + Math.abs(diceVelY) + Math.abs(diceVelZ);
          if (totalVel < 0.02) {
            // Smoothly lerp to target face rotation
            const t = FACE_ROT[diceTargetVal];
            diceMesh.rotation.x += (t.x - diceMesh.rotation.x) * 0.2;
            diceMesh.rotation.y += (t.y - diceMesh.rotation.y) * 0.2;
            diceMesh.rotation.z += (t.z - diceMesh.rotation.z) * 0.2;
            const diff =
              Math.abs(diceMesh.rotation.x - t.x) +
              Math.abs(diceMesh.rotation.y - t.y) +
              Math.abs(diceMesh.rotation.z - t.z);
            if (diff < 0.01) {
              diceMesh.rotation.set(t.x, t.y, t.z);
              diceRolling = false;
            }
          }
          // Dice bounce
          diceGroup.position.y =
            0.5 +
            Math.abs(Math.sin(time * 8)) * 0.3 * Math.min(1, totalVel * 5);
        } else {
          // Gentle float, only on Y-axis (doesn't change which face shows)
          diceGroup.position.y = 0.5 + Math.sin(time * 1.5) * 0.05;
          diceGroup.rotation.y += 0.003;
        }

        // Snake idle animation (only when visible)
        snakesMeshes.forEach((s) => {
          s.phase += dt * 2;
          // Indicator ring pulse (always visible)
          if (s.indicator) {
            s.indicator.material.emissiveIntensity =
              0.4 + Math.sin(s.phase * 2) * 0.4;
            s.indicator.position.y = 0.2 + Math.sin(s.phase * 1.5) * 0.03;
          }
          if (!s.head.visible) return;
          // Head bob
          s.head.position.y = 0.35 + Math.sin(s.phase * 1.5) * 0.05;
          s.head.rotation.y += Math.sin(s.phase) * 0.01;
          // Eye glow pulse
          s.head.children.forEach((c) => {
            if (c.material && c.material.emissiveIntensity !== undefined) {
              c.material.emissiveIntensity = 0.3 + Math.sin(s.phase * 2) * 0.3;
            }
          });
        });

        // Ladder indicator pulse + rung glow (only when visible)
        ladderMeshes.forEach((l) => {
          l.phase += dt * 1.5;
          // Indicator ring pulse (always visible)
          if (l.indicator) {
            l.indicator.material.emissiveIntensity =
              0.4 + Math.sin(l.phase * 2) * 0.4;
            l.indicator.position.y = 0.2 + Math.sin(l.phase * 1.5) * 0.03;
          }
          if (!l.group.visible) return;
          l.rungs.forEach((r, i) => {
            if (r.material) {
              const glow = 0.5 + Math.sin(l.phase + i * 0.5) * 0.3;
              r.material.emissive = new THREE.Color(0xffd700);
              r.material.emissiveIntensity = glow * 0.2;
            }
          });
        });

        // Pokéball corner glow pulse
        torchLights.forEach((t, i) => {
          t.light.intensity =
            t.baseIntensity + Math.sin(time * 2 + i * 1.5) * 0.3;
          // Pokéball gentle bob and spin
          if (t.ball) {
            t.ball.position.y = 1.05 + Math.sin(time * 1.5 + i * 1.2) * 0.05;
            t.ball.rotation.y += 0.008;
          }
          // Occasional sparkle
          if (Math.random() < 0.03) {
            const fp = t.pos.clone();
            fp.y = 1.1;
            spawn3DParticles(fp, "sparkle", 1);
          }
        });

        // Spotlight on current player
        if (GS && GS.phase === "playing") {
          const cp = GS.players[GS.currentPlayerIndex];
          if (cp && cp.position > 0) {
            const pos = cell3D(cp.position);
            spotLight.target.position.set(pos.x, 0, pos.z);
            spotLight.position.set(pos.x, 6, pos.z);
            spotLight.intensity = 1.5 + Math.sin(time * 3) * 0.5;
          } else {
            spotLight.intensity = 0;
          }
        }

        // Token idle animation (breathing)
        tokenMeshes.forEach((tk, i) => {
          if (!tk.visible) return;
          const isActive =
            GS && i === GS.currentPlayerIndex && GS.phase === "playing";
          if (isActive) {
            const s = 1 + Math.sin(time * 3) * 0.08;
            tk.scale.set(s, s, s);
          } else {
            tk.scale.set(1, 1, 1);
          }
        });

        // Ambient particles float
        ambientParticles.forEach((p) => {
          p.phase += dt * p.speed;
          p.mesh.position.y = p.baseY + Math.sin(p.phase) * 0.3;
          p.mesh.position.x += Math.sin(p.phase * 0.7) * 0.002;
          p.mesh.position.z += Math.cos(p.phase * 0.5) * 0.002;
          p.mesh.material.opacity = 0.2 + Math.sin(p.phase * 2) * 0.15;
        });

        // Victory orbit
        if (victoryActive) {
          victoryTimer += dt;
          const orbitAngle = victoryTimer * 0.5;
          camDesiredPos.set(
            Math.cos(orbitAngle) * 12,
            10 + Math.sin(victoryTimer) * 2,
            Math.sin(orbitAngle) * 12,
          );
          camDesiredTarget.set(0, 1, 0);
          camLerpSpeed = 0.05;
          if (Math.random() < 0.15) {
            const half = (BS * (CELL + GAP)) / 2;
            const fx = (Math.random() - 0.5) * half * 2,
              fz = (Math.random() - 0.5) * half * 2;
            spawn3DParticles(new THREE.Vector3(fx, 2, fz), "firework", 20);
          }
          if (Math.random() < 0.2) {
            const half = (BS * (CELL + GAP)) / 2;
            spawn3DParticles(
              new THREE.Vector3(
                (Math.random() - 0.5) * half * 2,
                4,
                (Math.random() - 0.5) * half * 2,
              ),
              "confetti",
              5,
            );
          }
        }

        updateParticles3D();
        renderer.render(scene, camera);
      }

      // =============================================================
      // TOKEN MOVEMENT
      // =============================================================
      function animateToken3D(idx, targetPos, duration = 500) {
        return new Promise((resolve) => {
          const tk = tokenMeshes[idx];
          const sx = tk.position.x,
            sz = tk.position.z,
            sy = tk.position.y;
          const tx = targetPos.x,
            tz = targetPos.z;
          const start = performance.now();
          function tick(now) {
            const t = Math.min(1, (now - start) / duration);
            const ease = t < 0.7 ? 1 - Math.pow(1 - t / 0.7, 3) : 1;
            tk.position.x = sx + (tx - sx) * ease;
            tk.position.z = sz + (tz - sz) * ease;
            // Hop arc
            tk.position.y = 0.15 + Math.sin(t * Math.PI) * 0.4;
            // Camera follows token smoothly
            camDesiredTarget.set(tk.position.x, 0.3, tk.position.z);
            camDesiredPos.set(tk.position.x + 3, 6, tk.position.z + 4);
            if (t < 1) requestAnimationFrame(tick);
            else {
              tk.position.y = 0.15;
              resolve();
            }
          }
          requestAnimationFrame(tick);
        });
      }

      async function moveTokenStepByStep(idx, from, to) {
        const tk = tokenMeshes[idx];
        // Make token visible and place it at starting cell
        if (!tk.visible) {
          tk.visible = true;
          const startCell = cell3D(from === 0 ? 1 : from);
          tk.position.set(startCell.x, 0.15, startCell.z);
        }
        const step = to > from ? 1 : -1;
        const start = from === 0 ? 1 : from + step;

        camLerpSpeed = 0.04;
        for (let pos = start; step > 0 ? pos <= to : pos >= to; pos += step) {
          const target = cell3D(pos);
          // Jump sound
          jumpAudio.currentTime = 0;
          jumpAudio.play().catch(() => {});
          // Dust trail
          spawn3DParticles(
            new THREE.Vector3(tk.position.x, 0.2, tk.position.z),
            "fire",
            1,
          );
          await animateToken3D(idx, target, 350);
        }
      }

      // Smooth slide along a snake's curve path
      function slideAlongSnake(idx, snakeObj, duration = 2200) {
        return new Promise((resolve) => {
          const tk = tokenMeshes[idx];
          const curve = snakeObj.curve;
          const start = performance.now();
          let lastParticleT = 0;
          function tick(now) {
            const t = Math.min(1, (now - start) / duration);
            // Ease in-out for dramatic effect
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            const pt = curve.getPointAt(ease);
            tk.position.set(pt.x, pt.y + 0.15, pt.z);
            // Camera tracks the token sliding down
            camDesiredTarget.set(tk.position.x, 0.5, tk.position.z);
            camDesiredPos.set(tk.position.x + 2, 4, tk.position.z + 3);
            // Continuous smoke/poison VFX trail
            if (t - lastParticleT > 0.06) {
              spawn3DParticles(
                new THREE.Vector3(pt.x, pt.y + 0.3, pt.z),
                "smoke",
                3,
              );
              lastParticleT = t;
            }
            if (t < 1) requestAnimationFrame(tick);
            else {
              tk.position.y = 0.15;
              resolve();
            }
          }
          requestAnimationFrame(tick);
        });
      }

      // Smooth slide along a ladder (straight line on board, with rising arc)
      function slideAlongLadder(idx, fromPos, toPos, duration = 1800) {
        return new Promise((resolve) => {
          const tk = tokenMeshes[idx];
          const sx = fromPos.x,
            sz = fromPos.z;
          const tx = toPos.x,
            tz = toPos.z;
          const start = performance.now();
          let lastParticleT = 0;
          function tick(now) {
            const t = Math.min(1, (now - start) / duration);
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            tk.position.x = sx + (tx - sx) * ease;
            tk.position.z = sz + (tz - sz) * ease;
            // Rising arc for climb feel
            tk.position.y = 0.15 + Math.sin(t * Math.PI) * 0.8;
            // Camera tracks upward
            camDesiredTarget.set(tk.position.x, 0.5, tk.position.z);
            camDesiredPos.set(tk.position.x + 2, 5, tk.position.z + 3);
            // Sparkle/star trail
            if (t - lastParticleT > 0.05) {
              spawn3DParticles(
                new THREE.Vector3(
                  tk.position.x,
                  tk.position.y + 0.2,
                  tk.position.z,
                ),
                "stars",
                2,
              );
              spawn3DParticles(
                new THREE.Vector3(tk.position.x, tk.position.y, tk.position.z),
                "sparkle",
                1,
              );
              lastParticleT = t;
            }
            if (t < 1) requestAnimationFrame(tick);
            else {
              tk.position.y = 0.15;
              resolve();
            }
          }
          requestAnimationFrame(tick);
        });
      }

      // =============================================================
      // SNAKE/LADDER APPEAR/DISAPPEAR ANIMATIONS
      // =============================================================
      function animateAppear(meshOrGroup, duration = 900) {
        return new Promise((resolve) => {
          if (meshOrGroup.isGroup || meshOrGroup.children) {
            meshOrGroup.visible = true;
            meshOrGroup.scale.set(0.01, 0.01, 0.01);
            const start = performance.now();
            function tick(now) {
              const t = Math.min(1, (now - start) / duration);
              // Elastic ease out
              const ease =
                t === 1
                  ? 1
                  : 1 -
                    Math.pow(2, -10 * t) *
                      Math.cos(((t * 10 - 0.75) * (2 * Math.PI)) / 3);
              const s = Math.max(0.01, ease);
              meshOrGroup.scale.set(s, s, s);
              if (t < 1) requestAnimationFrame(tick);
              else {
                meshOrGroup.scale.set(1, 1, 1);
                resolve();
              }
            }
            requestAnimationFrame(tick);
          } else {
            meshOrGroup.visible = true;
            resolve();
          }
        });
      }

      function animateDisappear(meshOrGroup, duration = 600) {
        return new Promise((resolve) => {
          const start = performance.now();
          function tick(now) {
            const t = Math.min(1, (now - start) / duration);
            const s = Math.max(0.01, 1 - t * t);
            meshOrGroup.scale.set(s, s, s);
            if (t < 1) requestAnimationFrame(tick);
            else {
              meshOrGroup.visible = false;
              meshOrGroup.scale.set(1, 1, 1);
              resolve();
            }
          }
          requestAnimationFrame(tick);
        });
      }

      // Show snake: tube + belly + head with staggered appear
      async function showSnake(snakeObj) {
        snakeObj.tube.visible = true;
        snakeObj.belly.visible = true;
        await animateAppear(snakeObj.head, 800);
        spawn3DParticles(
          snakeObj.from.clone().add(new THREE.Vector3(0, 0.5, 0)),
          "smoke",
          15,
        );
      }

      async function hideSnake(snakeObj) {
        await animateDisappear(snakeObj.head, 500);
        snakeObj.tube.visible = false;
        snakeObj.belly.visible = false;
      }

      async function showLadder(ladderObj) {
        ladderObj.group.visible = true;
        await animateAppear(ladderObj.group, 800);
        spawn3DParticles(
          ladderObj.from.clone().add(new THREE.Vector3(0, 0.5, 0)),
          "stars",
          15,
        );
      }

      async function hideLadder(ladderObj) {
        await animateDisappear(ladderObj.group, 500);
      }

      // =============================================================
      // GAME LOGIC
      // =============================================================
      function rollDiceVal() {
        return Math.floor(Math.random() * 6) + 1;
      }

      async function processTurn(dv) {
        const p = GS.players[GS.currentPlayerIndex];
        const pidx = GS.currentPlayerIndex;

        if (dv === 6) {
          GS.consecutiveSixes++;
          if (GS.consecutiveSixes >= 3) {
            addEvent(`${p.name} saco tres 6 seguidos, pierde turno`);
            GS.consecutiveSixes = 0;
            nextPlayer();
            return;
          }
          spawn3DParticles(diceGroup.position.clone(), "sparkle", 15);
        } else {
          GS.consecutiveSixes = 0;
        }

        const from = p.position;
        let to = from + dv;
        if (from === 0) to = dv;

        let bounced = false;
        if (to > 100) {
          to = 100 - (to - 100);
          bounced = true;
          addEvent(`${p.name} rebota a casilla ${to}`);
        } else {
          addEvent(`${p.name} avanza a casilla ${to}`);
        }

        // Camera will follow token via animateToken3D
        camLerpSpeed = 0.04;

        // Step by step
        if (bounced) {
          await moveTokenStepByStep(pidx, from, 100);
          await delay(400);
          await moveTokenStepByStep(pidx, 100, to);
        } else {
          await moveTokenStepByStep(pidx, from, to);
        }
        p.position = to;
        await delay(500);

        // Win check
        if (to === 100) {
          const pos = cell3D(100);
          spawn3DParticles(pos, "confetti", 80);
          spawn3DParticles(
            pos.clone().add(new THREE.Vector3(0, 2, 0)),
            "firework",
            40,
          );
          victoryAudio.currentTime = 0;
          victoryAudio.play().catch(() => {});
          addEvent(`&#x1F3C6; &#x00A1;${p.name} ha ganado!`, "ev-win");
          GS.phase = "finished";
          GS.winner = p;
          victoryActive = true;
          victoryTimer = 0;
          await delay(3500);
          showWinModal();
          return;
        }

        // Snake / Ladder — appear, slide, disappear
        const dest = boardMap.get(to);
        if (dest !== undefined) {
          await delay(600);
          const isSnake = dest < to;
          if (isSnake) {
            addEvent(
              `&#x1F40D; Serpiente! ${p.name} baja de ${to} a ${dest}`,
              "ev-snake",
            );
            snakeAudio.currentTime = 0;
            snakeAudio.play().catch(() => {});
            const cFrom = cell3D(to);
            // Camera zoom in
            setCameraTarget(cFrom.x, 1, cFrom.z, cFrom.x + 2, 4, cFrom.z + 3);
            camLerpSpeed = 0.05;
            await waitForCamera(1.5);
            // APPEAR: snake materializes
            const snakeObj = snakesMeshes.find((s) => s.data.s === to);
            if (snakeObj) {
              spawn3DParticles(
                cFrom.clone().add(new THREE.Vector3(0, 0.5, 0)),
                "smoke",
                30,
              );
              await showSnake(snakeObj);
              await delay(800);
              // SLIDE along snake
              await slideAlongSnake(pidx, snakeObj, 2200);
              const cTo = cell3D(dest);
              spawn3DParticles(cTo, "smoke", 25);
              spawn3DParticles(
                cTo.clone().add(new THREE.Vector3(0, 0.3, 0)),
                "fire",
                10,
              );
              await delay(600);
              // DISAPPEAR
              await hideSnake(snakeObj);
            } else {
              await moveTokenStepByStep(pidx, to, dest);
            }
          } else {
            addEvent(
              `&#x1FA9C; Escalera! ${p.name} sube de ${to} a ${dest}`,
              "ev-ladder",
            );
            ladderAudio.currentTime = 0;
            ladderAudio.play().catch(() => {});
            const cFrom = cell3D(to);
            setCameraTarget(cFrom.x, 1, cFrom.z, cFrom.x + 2, 5, cFrom.z + 3);
            camLerpSpeed = 0.05;
            await waitForCamera(1.5);
            // APPEAR: ladder materializes
            const ladderObj = ladderMeshes.find((l) => l.data.s === to);
            if (ladderObj) {
              spawn3DParticles(
                cFrom.clone().add(new THREE.Vector3(0, 0.5, 0)),
                "stars",
                30,
              );
              spawn3DParticles(cFrom, "sparkle", 15);
              await showLadder(ladderObj);
              await delay(800);
              // SLIDE along ladder
              const cTo = cell3D(dest);
              await slideAlongLadder(pidx, cFrom, cTo, 1800);
              spawn3DParticles(cTo, "stars", 35);
              spawn3DParticles(
                cTo.clone().add(new THREE.Vector3(0, 0.5, 0)),
                "confetti",
                20,
              );
              await delay(600);
              // DISAPPEAR
              await hideLadder(ladderObj);
            } else {
              await moveTokenStepByStep(pidx, to, dest);
            }
          }
          p.position = dest;
          await delay(400);
        }

        if (dv === 6) {
          addEvent(`&#x1F3B2; ${p.name} saco 6! Tira de nuevo`, "ev-extra");
        } else {
          nextPlayer();
        }
      }

      function nextPlayer() {
        GS.currentPlayerIndex = (GS.currentPlayerIndex + 1) % GS.players.length;
        GS.consecutiveSixes = 0;
        updateHUD();

        // Camera back to overview then to player
        setCameraForPlayer(GS.currentPlayerIndex);
        camLerpSpeed = 0.03;

        if (GS.players[GS.currentPlayerIndex].isCPU && GS.phase === "playing") {
          document.getElementById("rollBtn").disabled = true;
          setTimeout(() => handleRoll(), 1200 + Math.random() * 800);
        }
      }

      // =============================================================
      // UI
      // =============================================================
      function updateHUD() {
        const hud = document.getElementById("playerHUD");
        hud.innerHTML = "";
        GS.players.forEach((p, i) => {
          const active = i === GS.currentPlayerIndex && GS.phase === "playing";
          const d = document.createElement("div");
          d.className = `player-card ${active ? "active" : ""}`;
          d.style.borderLeftColor = p.color;
          d.innerHTML = `<div class="p-name">${p.isCPU ? "&#x1F916; " : ""}${p.name}</div>
      <div class="p-pos">Casilla: ${p.position === 0 ? "Inicio" : p.position}</div>
      ${active ? '<div class="turn-ind">&#x25C0; Turno</div>' : ""}`;
          hud.appendChild(d);
        });
      }
      function addEvent(t, cls = "") {
        const log = document.getElementById("eventLog");
        const d = document.createElement("div");
        d.className = `event-item ${cls}`;
        d.innerHTML = t;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
      }
      function showWinModal() {
        document.getElementById("winnerText").innerHTML =
          `<span style="color:${GS.winner.color};font-weight:bold">${GS.winner.name}</span> ha ganado la partida`;
        document.getElementById("modal").style.display = "flex";
      }
      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      // =============================================================
      // MAIN ACTIONS
      // =============================================================
      async function startGame() {
        document.querySelectorAll(".slot-name").forEach((input, i) => {
          if (playerConfigs[i]) playerConfigs[i].name = input.value;
        });
        GS = {
          players: playerConfigs.map((p, i) => ({
            id: `p${i}`,
            name: p.name,
            color: COLORS[i],
            position: 0,
            isCPU: p.isCPU,
          })),
          currentPlayerIndex: 0,
          phase: "playing",
          winner: null,
          consecutiveSixes: 0,
        };

        document.getElementById("lobby").style.display = "none";
        document.getElementById("gameHUD").style.display = "flex";
        document.getElementById("gameHUD").classList.remove("collapsed");
        document.getElementById("hudToggle").innerHTML = "&#x25BC;";
        document.getElementById("controls").style.display = "flex";
        document.getElementById("eventLog").innerHTML = "";
        victoryActive = false;
        camLerpSpeed = 0.03;

        await loadPokemonModels();
        initThree();
        updateHUD();

        // Start background music
        bgmAudio.currentTime = 0;
        bgmAudio.play().catch(() => {});

        // Intro camera sweep
        camDesiredPos.set(-10, 18, 12);
        await delay(500);
        setCameraOverview();

        if (GS.players[0].isCPU) {
          document.getElementById("rollBtn").disabled = true;
          setTimeout(() => handleRoll(), 1500);
        }
      }

      async function handleRoll() {
        if (!GS || GS.phase !== "playing" || isAnimating) return;
        const btn = document.getElementById("rollBtn");
        isAnimating = true;
        btn.disabled = true;

        const dv = rollDiceVal();
        const p = GS.players[GS.currentPlayerIndex];

        await rollDice3D(dv);
        await delay(600);

        document.getElementById("lastRoll").innerHTML =
          `${p.name}: <strong>${dv}</strong>` +
          (dv === 6
            ? ' <span class="extra-turn">&#x00A1;Otra vez!</span>'
            : "");

        // Camera to player — wait for it to arrive before moving
        setCameraForPlayer(GS.currentPlayerIndex);
        camLerpSpeed = 0.04;
        await waitForCamera(1.0);

        await processTurn(dv);

        isAnimating = false;
        updateHUD();
        if (GS.phase === "playing") {
          const curr = GS.players[GS.currentPlayerIndex];
          if (dv === 6 && curr === p) {
            // Same player rolls again after 6
            if (curr.isCPU) {
              btn.disabled = true;
              btn.textContent = `${curr.name} tira de nuevo...`;
              setTimeout(() => handleRoll(), 1200 + Math.random() * 800);
            } else {
              btn.disabled = false;
              btn.textContent = "\u{1F3B2} Tirar Dado";
            }
          } else {
            btn.disabled = curr.isCPU;
            btn.textContent = curr.isCPU
              ? `${curr.name} pensando...`
              : "\u{1F3B2} Tirar Dado";
          }
        }
      }

      function toggleHUD() {
        const hud = document.getElementById("gameHUD");
        const btn = document.getElementById("hudToggle");
        hud.classList.toggle("collapsed");
        btn.innerHTML = hud.classList.contains("collapsed")
          ? "&#x25B2;"
          : "&#x25BC;";
      }

      function resetGame() {
        victoryAudio.pause();
        victoryAudio.currentTime = 0;
        bgmAudio.pause();
        bgmAudio.currentTime = 0;
        document.getElementById("modal").style.display = "none";
        document.getElementById("gameHUD").style.display = "none";
        document.getElementById("controls").style.display = "none";
        document.getElementById("threeCanvas").style.display = "none";
        document.getElementById("lobby").style.display = "flex";

        // Cleanup Three.js
        if (renderer) {
          scene.traverse((obj) => {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
              if (Array.isArray(obj.material))
                obj.material.forEach((m) => m.dispose());
              else obj.material.dispose();
            }
          });
          renderer.dispose();
          renderer = null;
        }
        scene = null;
        camera = null;
        tokenMeshes = [];
        snakesMeshes = [];
        ladderMeshes = [];
        particleSystems = [];
        torchLights = [];
        ambientParticles = [];
        GS = null;
        isAnimating = false;
        victoryActive = false;
        document.getElementById("lastRoll").innerHTML = "";
      }
    </script>
  </body>
</html>
